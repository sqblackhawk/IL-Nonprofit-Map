<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illinois Nonprofit Economic Impact Map</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #controls {
            position: absolute; top: 20px; left: 60px; background: white; padding: 15px;
            border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); z-index: 1000; width: 250px;
        }
        #sidebar {
            position: absolute; top: 20px; right: 20px; width: 320px; background: white; padding: 20px;
            border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); z-index: 1000; max-height: 85%; overflow-y: auto;
        }
        h2, h3 { margin-top: 0; margin-bottom: 10px; color: #2c3e50; font-size: 16px; }
        select { width: 100%; padding: 8px; font-size: 14px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 15px; }
        .stat-box { padding: 10px; margin: 10px 0; border-radius: 4px; background: #f8f9fa; border-left: 5px solid #3498db; }
        .stat-value { font-size: 18px; font-weight: bold; color: #2c3e50; }
        .stat-label { font-size: 12px; color: #7f8c8d; }
        .popup-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; border-bottom: 1px solid #ccc; padding-bottom: 5px;}
        .popup-data { font-size: 13px; line-height: 1.4; }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
        
        /* Politician Card Styling */
        #politician-card {
            margin-top: 15px; padding-top: 15px; border-top: 2px dashed #eee; text-align: center;
        }
        #rep-photo {
            width: 110px; height: 140px; object-fit: cover; border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15); margin-bottom: 8px; background: #eee;
        }
        #rep-name { font-size: 16px; font-weight: bold; color: #2c3e50; margin: 2px 0; }
        #rep-party { font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        #rep-term { font-size: 12px; color: #7f8c8d; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="controls">
        <h3>Search Organizations</h3>
        <div style="position: relative;">
            <input type="text" id="map-search" placeholder="Search by name..." style="width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 3px;">
            <div id="search-results" style="position: absolute; width: 100%; max-height: 200px; overflow-y: auto; background: white; border: 1px solid #ccc; display: none; z-index: 1000; box-shadow: 0px 4px 6px rgba(0,0,0,0.1);"></div>
        </div>
        
        <hr>

        <h3>1. Select Political Boundary</h3>
        <select id="layer-select">
            <option value="none">-- Map Layers --</option>
            <option value="congressional">US Congressional</option>
            <option value="state_house">IL State House</option>
            <option value="state_senate">IL State Senate</option>
        </select>
        
        <hr>

        <h3>2. Filter Map Pins</h3>
        <select id="type-filter">
            <option value="all">All Nonprofit Types</option>
            <option value="3">501(c)(3) - Charities</option>
            <option value="4">501(c)(4) - Civic Leagues</option>
            <option value="5">501(c)(5) - Labor & Ag Orgs</option>
            <option value="6">501(c)(6) - Business Leagues</option>
            <option value="7">501(c)(7) - Social Clubs</option>
            <option value="8">501(c)(8) - Fraternal Beneficiary</option>
        </select>
        
        <hr>

        <h3>3. Financial Impact</h3>
        <select id="revenue-filter">
            <option value="0">All Organizations</option>
            <option value="1">Active Only (> $0)</option>
            <option value="100000">Significant (> $100k)</option>
            <option value="1000000">Major Players (> $1M)</option>
        </select>
    </div>

    <div id="sidebar">
        <h2 id="sidebar-title" style="font-size: 20px;">District Impact Summary</h2>
        <p id="sidebar-instructions" style="font-size: 14px; color: #555;">Click on any district boundary to view the full economic footprint.</p>
        
        <div id="sidebar-stats" style="display: none;">
            <div class="stat-box" style="border-left-color: #2ecc71;">
                <div class="stat-value" id="stat-count">0</div>
                <div class="stat-label">Total Organizations</div>
            </div>
            <div class="stat-box" style="border-left-color: #f1c40f;">
                <div class="stat-value" id="stat-revenue">$0</div>
                <div class="stat-label">Combined Annual Revenue</div>
            </div>
            <div class="stat-box" style="border-left-color: #e74c3c;">
                <div class="stat-value" id="stat-assets">$0</div>
                <div class="stat-label">Combined Total Assets</div>
            </div>

            <div id="politician-card" style="display: none;">
                <h3>District Representative</h3>
                <img id="rep-photo" src="" alt="No Image Found">
                <div id="rep-name"></div>
                <div id="rep-party"></div>
                <div id="rep-term"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const map = L.map('map').setView([40.0, -89.0], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let currentBoundaryLayer = null;
        let activeAggregates = null;
        let allNonprofitData = []; 
        
        // SEARCH DICTIONARY INITIALIZATION
        const markerDictionary = {}; 

        const markerClusterGroup = L.markerClusterGroup({ chunkedLoading: true, maxClusterRadius: 50 });

        function formatCurrency(num) {
            if (num >= 1.0e9) return "$" + (num / 1.0e9).toFixed(2) + " Billion";
            if (num >= 1.0e6) return "$" + (num / 1.0e6).toFixed(2) + " Million";
            if (num >= 1.0e3) return "$" + (num / 1.0e3).toFixed(1) + " Thousand";
            return "$" + num.toLocaleString();
        }

        // Parse local CSV pins
        Papa.parse("data_processed/il_nonprofits_geocoded.csv?v=9", {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) { allNonprofitData = results.data; renderPins(); }
        });

        function renderPins() {
            markerClusterGroup.clearLayers();
            for (let key in markerDictionary) delete markerDictionary[key];

            const filterValue = document.getElementById('type-filter').value;
            const minRevenue = parseFloat(document.getElementById('revenue-filter').value) || 0;
            const markers = [];
            const groupedData = {};

            // PHASE 1: Group Strictly by Coordinate (Latitude & Longitude only)
            for (let i = 0; i < allNonprofitData.length; i++) {
                const row = allNonprofitData[i];
                const subsection = row.SUBSECTION || "Unknown";
                
                if (filterValue !== 'all' && String(subsection) !== filterValue) continue;

                const revAmt = parseFloat(row.REVENUE_AMT) || 0;
                if (revAmt < minRevenue) continue;

                const lat = parseFloat(row.LATITUDE);
                const lon = parseFloat(row.LONGITUDE);

                if (!isNaN(lat) && !isNaN(lon)) {
                    const name = (row.NAME || "Unknown").toUpperCase().trim();
                    const groupKey = `${lat}_${lon}`; // Removed Name from grouping logic

                    if (!groupedData[groupKey]) {
                        groupedData[groupKey] = {
                            lat: lat,
                            lon: lon,
                            count: 0,
                            totalRevenue: 0,
                            totalAssets: 0,
                            instances: []
                        };
                    }

                    groupedData[groupKey].count += 1;
                    groupedData[groupKey].totalRevenue += (parseFloat(row.REVENUE_AMT) || 0);
                    groupedData[groupKey].totalAssets += (parseFloat(row.ASSET_AMT) || 0);
                    groupedData[groupKey].instances.push({
                        name: name,
                        subsection: subsection,
                        revenue: parseFloat(row.REVENUE_AMT) || 0,
                        assets: parseFloat(row.ASSET_AMT) || 0
                    });
                }
            }

            // PHASE 2: Render Standard Popups vs. Mega-Nodes
            for (const groupKey in groupedData) {
                const group = groupedData[groupKey];
                
                // For a single organization, show a standard clean popup
                if (group.count === 1) {
                    const inst = group.instances[0];
                    const popupHTML = `
                        <div class="popup-title">${inst.name}</div>
                        <div class="popup-data">
                            <b>Classification:</b> 501(c)(${inst.subsection})<br>
                            <b>Annual Revenue:</b> ${formatCurrency(inst.revenue)}<br>
                            <b>Total Assets:</b> ${formatCurrency(inst.assets)}
                        </div>
                    `;
                    const marker = L.marker([group.lat, group.lon]).bindPopup(popupHTML);
                    markers.push(marker);
                    markerDictionary[inst.name.toLowerCase()] = marker;
                } 
                
                // For 2 to 14 organizations, show a scrollable aggregated popup
                else if (group.count > 1 && group.count < 15) {
                    let popupHTML = `
                        <div class="popup-title">Multi-Entity Location (${group.count})</div>
                        <div class="popup-data">
                            <b>Combined Revenue:</b> ${formatCurrency(group.totalRevenue)}<br>
                            <b>Combined Assets:</b> ${formatCurrency(group.totalAssets)}
                            <hr style="margin: 8px 0;">
                            <div style="max-height: 150px; overflow-y: auto; font-size: 11px; background: #f9f9f9; padding: 5px; border: 1px solid #eee;">
                    `;
                    
                    group.instances.forEach((inst, idx) => {
                        popupHTML += `
                            <div style="margin-bottom: 4px; border-bottom: 1px dotted #ccc; padding-bottom: 4px;">
                                <b>${inst.name}</b><br>
                                Rev: ${formatCurrency(inst.revenue)} | Ast: ${formatCurrency(inst.assets)}
                            </div>
                        `;
                    });
                    
                    popupHTML += `</div></div>`;
                    const marker = L.marker([group.lat, group.lon]).bindPopup(popupHTML);
                    markers.push(marker);
                    
                    // Add all names to the search dictionary pointing to this one marker
                    group.instances.forEach(inst => { markerDictionary[inst.name.toLowerCase()] = marker; });
                }

                // For 15+ organizations (MEGA-NODES), bypass the popup and hijack the Sidebar
                else {
                    const marker = L.marker([group.lat, group.lon]);
                    
                    // Add a custom click event instead of a popup
                    marker.on('click', function(e) {
                        L.DomEvent.stopPropagation(e); // Prevent map click from overriding
                        
                        // Hijack the Sidebar UI
                        document.getElementById('sidebar-title').innerText = `High-Density Location: ${group.count} Entities`;
                        document.getElementById('sidebar-instructions').style.display = 'none';
                        document.getElementById('sidebar-stats').style.display = 'block';
                        
                        document.getElementById('stat-count').innerText = group.count.toLocaleString();
                        document.getElementById('stat-revenue').innerText = formatCurrency(group.totalRevenue);
                        document.getElementById('stat-assets').innerText = formatCurrency(group.totalAssets);
                        
                        // Hide the politician card since this is an address, not a district
                        document.getElementById('politician-card').style.display = 'none';

                        // Create a temporary scrollable ledger inside the sidebar
                        let existingLedger = document.getElementById('mega-node-ledger');
                        if (existingLedger) existingLedger.remove();

                        let ledgerHTML = `<div id="mega-node-ledger" style="margin-top: 15px; max-height: 250px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; background: #fdfdfd; font-size: 12px;">`;
                        
                        // For performance, only render the first 200 in the list to prevent UI lag, even in the sidebar
                        const displayLimit = Math.min(group.count, 200);
                        for(let i=0; i < displayLimit; i++) {
                            const inst = group.instances[i];
                            ledgerHTML += `
                                <div style="margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 6px;">
                                    <strong>${inst.name}</strong><br>
                                    <span style="color: #555;">Rev: ${formatCurrency(inst.revenue)} | Ast: ${formatCurrency(inst.assets)}</span>
                                </div>
                            `;
                        }
                        
                        if(group.count > 200) {
                            ledgerHTML += `<div style="text-align: center; color: #888; margin-top: 5px;"><i>+ ${group.count - 200} more entities not displayed</i></div>`;
                        }
                        
                        ledgerHTML += `</div>`;
                        document.getElementById('sidebar-stats').insertAdjacentHTML('beforeend', ledgerHTML);
                    });

                    markers.push(marker);
                    group.instances.forEach(inst => { markerDictionary[inst.name.toLowerCase()] = marker; });
                }
            }

            markerClusterGroup.addLayers(markers).addTo(map);
        }

        document.getElementById('type-filter').addEventListener('change', renderPins);
        document.getElementById('revenue-filter').addEventListener('change', renderPins);

        // Add an event listener to the map to clear the Mega-Node ledger when clicking away
        map.on('click', function() {
            let existingLedger = document.getElementById('mega-node-ledger');
            if (existingLedger) existingLedger.remove();
        });

        // Boundary Rendering and Sidebar Update Engine
        document.getElementById('layer-select').addEventListener('change', function(e) {
            const selectedLayer = e.target.value;
            if (currentBoundaryLayer) { map.removeLayer(currentBoundaryLayer); currentBoundaryLayer = null; }
            document.getElementById('sidebar-stats').style.display = 'none';
            document.getElementById('sidebar-instructions').style.display = 'block';
            document.getElementById('sidebar-title').innerText = "District Impact Summary";

            if (selectedLayer === 'none') return;

            fetch(`data_processed/aggregated_${selectedLayer}.json?v=9`)
                .then(res => res.json())
                .then(aggregateData => {
                    activeAggregates = aggregateData;
                    return fetch(`data_processed/boundaries_${selectedLayer}.geojson`);
                })
                .then(res => res.json())
                .then(geojsonData => {
                    currentBoundaryLayer = L.geoJson(geojsonData, {
                        style: { color: "#2980b9", weight: 2, fillColor: "#3498db", fillOpacity: 0.15 },
                        onEachFeature: function(feature, layer) {
                            const distId = feature.properties.DISTRICT || feature.properties.District || feature.properties.DIST_NO;
                            layer.on('mouseover', function() { this.setStyle({ fillOpacity: 0.3, weight: 3 }); });
                            layer.on('mouseout', function() { this.setStyle({ fillOpacity: 0.15, weight: 2 }); });

                            layer.on('click', function(event) {
                                L.DomEvent.stopPropagation(event);
                                const idStr = String(distId);
                                document.getElementById('sidebar-title').innerText = `District #${idStr} Footprint`;
                                
                                if (activeAggregates && activeAggregates[idStr]) {
                                    const stats = activeAggregates[idStr];
                                    
                                    // Set Financial Texts
                                    document.getElementById('stat-count').innerText = stats.count.toLocaleString();
                                    document.getElementById('stat-revenue').innerText = formatCurrency(stats.revenue);
                                    document.getElementById('stat-assets').innerText = formatCurrency(stats.assets);
                                    
                                    // Handle Politician Sub-Card Evaluation
                                    const card = document.getElementById('politician-card');
                                    if (stats.rep_name) {
                                        document.getElementById('rep-name').innerText = stats.rep_name;
                                        document.getElementById('rep-term').innerText = stats.rep_term;
                                        
                                        const partyEl = document.getElementById('rep-party');
                                        partyEl.innerText = stats.rep_party;
                                        
                                        // Dynamic Color Coding
                                        const pLower = stats.rep_party.toLowerCase();
                                        if (pLower.includes('democrat')) {
                                            partyEl.style.color = '#2980b9';
                                        } else if (pLower.includes('republican')) {
                                            partyEl.style.color = '#c0392b';
                                        } else {
                                            partyEl.style.color = '#7f8c8d';
                                        }
                                        
                                        // Set image src path and mount fallback
                                        const imgEl = document.getElementById('rep-photo');
                                        imgEl.src = stats.rep_photo.replace("images/", "images/legislator_headshots/");
                                        imgEl.onerror = function() {
                                            this.onerror = null; 
                                            this.src = "https://via.placeholder.com/110x140?text=No+Photo";
                                        };
                                        
                                        card.style.display = 'block';
                                    } else {
                                        card.style.display = 'none';
                                    }
                                    
                                    document.getElementById('sidebar-instructions').style.display = 'none';
                                    document.getElementById('sidebar-stats').style.display = 'block';
                                }
                            });
                        }
                    }).addTo(map);
                });
        });

        // SEARCH BAR LOGIC
        const searchInput = document.getElementById('map-search');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            searchResults.innerHTML = ''; 

            if (query.length < 3) {
                searchResults.style.display = 'none';
                return;
            }

            const matches = Object.keys(markerDictionary).filter(name => name.includes(query)).slice(0, 10);

            if (matches.length > 0) {
                searchResults.style.display = 'block';
                
                matches.forEach(matchName => {
                    const resultItem = document.createElement('div');
                    resultItem.innerText = matchName.toUpperCase(); 
                    resultItem.style.padding = '8px';
                    resultItem.style.cursor = 'pointer';
                    resultItem.style.borderBottom = '1px solid #eee';
                    resultItem.style.fontSize = '12px';

                    resultItem.onmouseover = () => resultItem.style.background = '#f4f4f4';
                    resultItem.onmouseout = () => resultItem.style.background = 'white';

                    resultItem.onclick = function() {
                        const targetMarker = markerDictionary[matchName];
                        
                        // Physically zooms into the cluster and opens the target popup
                        markerClusterGroup.zoomToShowLayer(targetMarker, function() {
                            targetMarker.openPopup();
                        });

                        searchResults.style.display = 'none';
                        searchInput.value = ''; 
                    };
                    
                    searchResults.appendChild(resultItem);
                });
            } else {
                searchResults.style.display = 'none';
            }
        });
    </script>
</body>
</html>
